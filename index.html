<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Power BI Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #ffffff;
            color: #1a1a1a;
            -webkit-tap-highlight-color: transparent;
        }
        .app-container {
            max-width: 600px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 40px 24px;
        }
        .portal-card {
            border-radius: 32px;
            padding: 32px;
            margin-bottom: 20px;
            border: 1px solid rgba(0, 0, 0, 0.08);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 24px;
            text-align: left;
            width: 100%;
        }
        .portal-card:active { transform: scale(0.96); }
        .icon-box {
            width: 64px;
            height: 64px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            shrink-0;
        }
        #lock-screen {
            position: fixed;
            inset: 0;
            background: white;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
        }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="relative w-24 h-24 mb-8 flex items-center justify-center">
            <!-- Outer Glow -->
            <div id="status-glow" class="absolute inset-0 bg-blue-500/10 rounded-full blur-xl animate-pulse"></div>
            <!-- Spinning Ring -->
            <div id="status-ring" class="absolute inset-0 rounded-full border-[3px] border-slate-100 border-t-blue-600 animate-spin"></div>
            <!-- Center Icon Box -->
            <div class="relative w-16 h-16 bg-white rounded-2xl shadow-xl flex items-center justify-center border border-slate-100">
                <div id="status-icon-container">
                    <i data-lucide="shield-check" class="w-8 h-8 text-blue-600"></i>
                </div>
            </div>
        </div>
        <h2 id="status-text" class="text-2xl font-extrabold tracking-tight text-slate-900 text-center">Security Check</h2>
        <p id="status-subtext" class="text-base font-medium text-slate-400 mt-2 text-center">Verifying your identity...</p>
    </div>

    <div id="portal-ui" class="app-container hidden">
        <header class="mb-12">
            <h1 class="text-[clamp(3rem,12vw,4rem)] font-extrabold tracking-tighter leading-none mb-4">Menu</h1>
            <p class="text-sm font-bold text-slate-400 uppercase tracking-widest">Select a module to continue</p>
        </header>

        <div class="space-y-4">
            <!-- Stock Control -->
            <button id="btn-stock" onclick="location.href='stock.html'" class="portal-card bg-[#F3FFEF] hidden">
                <div class="icon-box bg-black text-[#DDFF55]">
                    <i data-lucide="package" class="w-8 h-8"></i>
                </div>
                <div>
                    <h3 class="text-2xl font-extrabold tracking-tight">Stock</h3>
                    <p class="text-xs font-bold opacity-40 uppercase tracking-tight">Inventory & Procurement Control</p>
                </div>
            </button>

            <!-- Daily Report -->
            <button id="btn-report" onclick="location.href='daily_report.html'" class="portal-card bg-[#FFE5E8] hidden">
                <div class="icon-box bg-black text-[#FF7788]">
                    <i data-lucide="zap" class="w-8 h-8"></i>
                </div>
                <div>
                    <h3 class="text-2xl font-extrabold tracking-tight">Analytics</h3>
                    <p class="text-xs font-bold opacity-40 uppercase tracking-tight">Market Drivers & Daily Reports</p>
                </div>
            </button>
        </div>
        
        <footer class="mt-20 text-center">
            <p class="text-[10px] font-bold text-slate-300 uppercase tracking-[0.3em]">Power BI Enterprise Edition</p>
        </footer>
    </div>

    <!-- Supabase Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        const SUPABASE_URL = "https://mmsjmkvkytiehqdvsclt.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1tc2pta3ZreXRpZWhxZHZzY2x0Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3Njg0ODM3MSwiZXhwIjoyMDkyNDI0MzcxfQ.R93Uw0jHyirg3JRC3lcVOCDqg-NEDpEMAfcRrlXv-sI";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function updateStatus(title, sub, icon, colorClass, spinning = true) {
            document.getElementById('status-text').innerText = title;
            document.getElementById('status-subtext').innerText = sub;
            
            const ring = document.getElementById('status-ring');
            const glow = document.getElementById('status-glow');
            const iconContainer = document.getElementById('status-icon-container');

            // Set Color
            const borderClass = spinning ? `border-t-${colorClass.colorName}-600` : `border-${colorClass.colorName}-500`;
            ring.className = `absolute inset-0 rounded-full border-[3px] border-slate-100 ${borderClass} ${spinning ? 'animate-spin' : ''}`;
            glow.className = `absolute inset-0 ${colorClass.bg} rounded-full blur-xl animate-pulse`;
            
            // Set Icon
            iconContainer.innerHTML = `<i data-lucide="${icon}" class="w-8 h-8 ${colorClass.text}"></i>`;
            lucide.createIcons();
        }

        const COLORS = {
            blue: { colorName: 'blue', bg: 'bg-blue-500/10', text: 'text-blue-600' },
            orange: { colorName: 'orange', bg: 'bg-orange-500/10', text: 'text-orange-500' },
            red: { colorName: 'red', bg: 'bg-red-500/10', text: 'text-red-500' }
        };

        async function checkAccess() {
            try {
                if (!window.Telegram || !window.Telegram.WebApp || !window.Telegram.WebApp.initDataUnsafe?.user) {
                    updateStatus("Access Limited", "Open via Telegram Bot", "lock", COLORS.orange, false);
                    return;
                }

                const userId = window.Telegram.WebApp.initDataUnsafe.user.id;
                const { data, error } = await _supabase
                    .from('authorized_users')
                    .select('access')
                    .eq('telegram_id', userId);

                if (error) throw error;

                if (data && data.length > 0) {
                    const access = data[0].access || 'view';
                    handleNavigation(access);
                } else {
                    updateStatus("Access Denied", `ID ${userId} is not authorized`, "shield-off", COLORS.red, false);
                }
            } catch (e) {
                console.error(e);
                updateStatus("System Error", e.message, "alert-circle", COLORS.red, false);
            }
        }

        function handleNavigation(access) {
            const hasStock = access === 'all' || access.includes('stock');
            const hasReport = access === 'all' || access.includes('report');
            const isAdmin = access === 'all';

            // Если доступ только к одному - редирект сразу
            if (hasStock && !hasReport && !isAdmin) {
                location.href = 'stock.html';
                return;
            }
            if (hasReport && !hasStock && !isAdmin) {
                location.href = 'daily_report.html';
                return;
            }

            // Если несколько или админ - показываем меню
            document.getElementById('lock-screen').style.display = 'none';
            document.getElementById('portal-ui').classList.remove('hidden');

            if (hasStock) document.getElementById('btn-stock').classList.remove('hidden');
            if (hasReport) document.getElementById('btn-report').classList.remove('hidden');
            
            lucide.createIcons();
        }

        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.ready();
                window.Telegram.WebApp.expand();
            }
            checkAccess();
        });
    </script>
</body>
</html>
