<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Daily Market Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #ffffff;
            color: #1a1a1a;
            -webkit-tap-highlight-color: transparent;
        }

        .app-container {
            max-width: 600px;
            margin: 0 auto;
            min-height: 100vh;
            padding-top: 20px;
        }

        .card-modern {
            border-radius: 32px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(0, 0, 0, 0.08);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card-gain {
            background-color: #F3FFEF;
            border: 1px solid rgba(0, 128, 0, 0.05);
        }

        .card-decline {
            background-color: #FFE5E8;
            border: 1px solid rgba(255, 0, 0, 0.05);
        }

        .card-neutral {
            background-color: #F6F1EC;
        }

        .card-new {
            background-color: #E5F6FF;
        }

        .tag {
            background: rgba(255, 255, 255, 0.6);
            padding: 4px 14px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
            color: #1a1a1a;
            white-space: nowrap;
        }

        .badge-delta {
            padding: 6px 12px;
            border-radius: 14px;
            font-weight: 800;
            font-size: 12px;
        }

        #lock-screen {
            position: fixed;
            inset: 0;
            background: white;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="pb-10 overflow-x-hidden">

    <!-- LOADING SCREEN -->
    <div id="lock-screen">
        <div class="relative w-24 h-24 mb-8 flex items-center justify-center">
            <!-- Outer Glow -->
            <div class="absolute inset-0 bg-blue-500/10 rounded-full blur-xl animate-pulse"></div>
            <!-- Spinning Ring -->
            <div class="absolute inset-0 rounded-full border-[3px] border-slate-100 border-t-blue-600 animate-spin">
            </div>
            <!-- Center Icon Box -->
            <div
                class="relative w-16 h-16 bg-white rounded-2xl shadow-xl flex items-center justify-center border border-slate-100">
                <i data-lucide="refresh-cw" class="w-8 h-8 text-blue-600"></i>
            </div>
        </div>
        <h2 class="text-2xl font-extrabold tracking-tight text-slate-900">Analyzing Data...</h2>
        <p class="text-base font-medium text-slate-400 mt-2">Generating your daily report</p>
    </div>

    <div id="view-report" class="app-container hidden">
        <!-- Header -->
        <header class="flex justify-between items-center mb-8 px-6 pt-8">
            <button onclick="window.location.href='index.html'"
                class="w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-sm active:scale-90 transition-transform border border-slate-100">
                <i data-lucide="chevron-left" class="w-6 h-6 text-slate-900"></i>
            </button>
            <h1 class="text-3xl font-extrabold tracking-tight">Analytics</h1>
            <div class="w-12 h-12"></div>
        </header>

        <div class="px-6 mb-4 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-2.5 h-2.5 bg-green-500 rounded-full animate-pulse"></div>
                <span id="date-label" class="text-sm font-bold text-slate-900 tracking-tight uppercase">Loading dates...</span>
            </div>
            <div class="relative">
                <input type="date" id="date-picker" class="absolute inset-0 opacity-0 cursor-pointer" onchange="handleDateChange(this.value)">
                <button class="w-8 h-8 bg-slate-100 rounded-lg flex items-center justify-center active:scale-95 transition-transform">
                    <i data-lucide="calendar" class="w-4 h-4 text-slate-600"></i>
                </button>
            </div>
        </div>

        <!-- KPI Card -->
        <div id="kpi-container" class="px-6 mb-8">
            <!-- Injected -->
        </div>

        <!-- Sections -->
        <div id="report-sections" class="px-6">
            <!-- Injected -->
        </div>
    </div>

    <!-- Supabase Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        const SUPABASE_URL = "__SUPABASE_URL__";
        const SUPABASE_KEY = "__SUPABASE_KEY__";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const API_BASE = "__API_BASE__";

        function formatCompact(val) {
            const abs = Math.abs(val);
            const sign = val < 0 ? '-' : '';
            if (abs >= 1000000) {
                const m = abs / 1000000;
                return `${sign}$${m >= 100 ? m.toFixed(0) : m.toFixed(2)}M`;
            }
            if (abs >= 1000) {
                const k = abs / 1000;
                return `${sign}$${k >= 100 ? k.toFixed(0) : k.toFixed(1)}K`;
            }
            return `${sign}$${abs.toFixed(0)}`;
        }

        async function checkAccess() {
            try {
                if (!window.Telegram || !window.Telegram.WebApp || !window.Telegram.WebApp.initDataUnsafe?.user) {
                    return false;
                }
                const userId = window.Telegram.WebApp.initDataUnsafe.user.id;
                const { data, error } = await _supabase
                    .from('authorized_users')
                    .select('stock_access, report_access')
                    .eq('telegram_id', userId);

                if (data && data.length > 0) {
                    const user = data[0];

                    // Скрываем кнопку назад, если нет доступа к стоку
                    const hasStock = user.stock_access && user.stock_access !== 'none';
                    if (!hasStock) {
                        const backBtn = document.querySelector('button[onclick*="index.html"]');
                        if (backBtn) backBtn.style.display = 'none';
                    }

                    return user.report_access && user.report_access !== 'none';
                }
                return false;
            } catch (e) { return false; }
        }

        async function fetchReport(selectedDate = null) {
            try {
                if (!selectedDate) {
                    document.getElementById('lock-screen').style.display = 'flex';
                }
                const hasAccess = await checkAccess();
                if (!hasAccess) {
                    document.getElementById('lock-screen').innerHTML = `
                        <div class="p-8 text-center">
                            <i data-lucide="shield-off" class="w-12 h-12 text-rose-500 mx-auto mb-4"></i>
                            <h2 class="text-xl font-bold">Access Denied</h2>
                            <p class="text-sm text-slate-400 mt-2">You are not authorized to view this report.</p>
                        </div>
                    `;
                    lucide.createIcons();
                    return;
                }

                document.getElementById('view-report').classList.remove('hidden');

                // Fetch pre-calculated report from Supabase
                // If selectedDate is provided, fetch specific ID daily_analytics_YYYY-MM-DD
                const reportId = selectedDate ? `daily_analytics_${selectedDate}` : 'daily_analytics';

                const { data: reportRow, error: reportError } = await _supabase
                    .from('analytical_reports')
                    .select('data, updated_at')
                    .eq('report_id', reportId)
                    .single();

                if (reportError || !reportRow) {
                    throw new Error("Report not found in database. Please wait for the daily update.");
                }

                let reportData = reportRow.data;
                if (typeof reportData === 'string') {
                    try {
                        reportData = JSON.parse(reportData);
                    } catch (e) {
                        console.error("JSON Parse Error", e);
                    }
                }

                const updatedAt = new Date(reportRow.updated_at);
                
                // Set the date label based on the report's period_info
                if (reportData.period_info && reportData.period_info.period_b) {
                    const reportDate = new Date(reportData.period_info.period_b.start);
                    document.getElementById('date-label').innerText = `Report for: ${reportDate.toLocaleDateString('en-US', { day: 'numeric', month: 'long', year: 'numeric' })}`;
                    document.getElementById('date-picker').value = reportData.period_info.period_b.start;
                } else {
                    document.getElementById('date-label').innerText = `Report Updated: ${updatedAt.toLocaleDateString()}`;
                }

                renderUI(reportData, updatedAt);
                document.getElementById('lock-screen').style.display = 'none';
                lucide.createIcons();
            } catch (e) {
                console.error(e);
                document.getElementById('lock-screen').innerHTML = `
                    <div class="p-8 text-center">
                        <i data-lucide="alert-circle" class="w-12 h-12 text-red-500 mx-auto mb-4"></i>
                        <h2 class="text-xl font-bold">Data Error</h2>
                        <p class="text-sm text-slate-400 mt-2">${e.message}</p>
                    </div>
                `;
                lucide.createIcons();
            }
        }

        function handleDateChange(date) {
            if (!date) return;
            fetchReport(date);
        }

        function renderTop5(rankings, activeDim = 'products') {
            const dimLabels = {
                'products': 'Products',
                'categories': 'Categories',
                'clients': 'Clients'
            };

            const items = (rankings && rankings[activeDim]) || [];

            return `
                <div class="card-modern bg-white shadow-sm border-slate-100 mb-8">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-xl font-black tracking-tight text-slate-900 leading-none">Top 5</h3>
                        <div class="bg-slate-100 p-1 rounded-xl flex gap-1">
                            ${['products', 'categories', 'clients'].map(dim => `
                                <button onclick="window.switchTop5Dimension('${dim}')" 
                                    class="px-2.5 py-1.5 rounded-lg text-[9px] font-black uppercase tracking-tight transition-all ${activeDim === dim ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-400'}">
                                    ${dimLabels[dim]}
                                </button>
                            `).join('')}
                        </div>
                    </div>
                    <div class="space-y-4">
                        ${items.length > 0 ? items.map((item, idx) => `
                            <div class="flex justify-between items-center">
                                <div class="flex items-center gap-3">
                                    <span class="w-5 h-5 flex items-center justify-center bg-slate-50 rounded-md text-[10px] font-black text-slate-400">${idx + 1}</span>
                                    <span class="text-sm font-bold text-slate-700 truncate max-w-[170px]">${item.name}</span>
                                </div>
                                <span class="text-sm font-black text-slate-900">${formatCompact(item.rev)}</span>
                            </div>
                        `).join('') : '<p class="text-center py-4 text-xs font-bold text-slate-400 italic uppercase">No data available</p>'}
                    </div>
                </div>
            `;
        }

        function generateTrendChart(points, width = 400, height = 100) {
            if (!points || points.length === 0) return '';
            const values = points.map(p => p.value);
            const maxVal = Math.max(...values) * 1.2;
            const minVal = Math.min(...values) * 0.8;
            const range = maxVal - minVal || 1;

            const paddingX = 25;
            const drawWidth = width - (paddingX * 2);
            const getX = (i) => paddingX + i * (drawWidth / (points.length - 1));
            const getY = (v) => height - ((v - minVal) / range) * height;

            const pathData = points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${getX(i)} ${getY(p.value)}`).join(' ');
            const areaData = pathData + ` L ${getX(points.length - 1)} ${height} L ${getX(0)} ${height} Z`;

            return `
                <div class="relative w-full">
                    <svg width="100%" viewBox="0 0 ${width} ${height}" style="overflow: visible; display: block;">
                        <defs>
                            <linearGradient id="chartGrad" x1="0" y1="0" x2="0" y2="1">
                                <stop offset="0%" stop-color="rgba(37, 99, 235, 0.12)" />
                                <stop offset="100%" stop-color="rgba(37, 99, 235, 0)" />
                            </linearGradient>
                        </defs>
                        <path d="${areaData}" fill="url(#chartGrad)" />
                        <path d="${pathData}" fill="none" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke" />
                        ${points.map((p, i) => {
                const prev = i > 0 ? points[i - 1].value : null;
                const pct = prev ? ((p.value - prev) / (prev || 1) * 100).toFixed(0) : null;
                const isUp = pct >= 0;
                return `
                                <circle cx="${getX(i)}" cy="${getY(p.value)}" r="3" fill="white" stroke="#2563eb" stroke-width="2" />
                                ${pct !== null ? `
                                    <text x="${getX(i)}" y="${getY(p.value) - 15}" text-anchor="middle" font-size="9" font-weight="900" fill="${isUp ? '#10b981' : '#f43f5e'}">
                                        ${isUp ? '↑' : '↓'}${Math.abs(pct)}%
                                    </text>
                                ` : ''}
                            `;
            }).join('')}
                    </svg>
                    <div class="flex justify-between mt-6">
                        ${points.map(p => `
                            <div class="text-center w-[50px]">
                                <p class="text-[8px] font-bold text-slate-400 uppercase leading-none mb-1">${p.label}</p>
                                <p class="text-[10px] font-black text-slate-900">${formatCompact(p.value)}</p>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function renderUI(data, updatedAt) {
            // Dates from period_info
            const dateB = data.period_info ? new Date(data.period_info.period_b.start) : new Date(updatedAt);
            const dateA = data.period_info ? new Date(data.period_info.period_a.start) : new Date(dateB);
            if (!data.period_info) dateA.setDate(dateB.getDate() - 1);

            const strB = dateB.toLocaleDateString('en-US', { day: 'numeric', month: 'short' });
            const strA = dateA.toLocaleDateString('en-US', { day: 'numeric', month: 'short' });

            // KPI from global_metrics
            const totalRevB = data.global_metrics ? data.global_metrics.rev_b : 0;
            const totalRevA = data.global_metrics ? data.global_metrics.rev_a : 0;
            const totalDelta = totalRevB - totalRevA;

            const kpiContainer = document.getElementById('kpi-container');
            kpiContainer.innerHTML = `
                <div class="card-modern bg-black text-white">
                    <div class="mb-2">
                        <p class="text-[11px] font-bold opacity-40 uppercase tracking-[0.2em]">Revenue // ${strB}</p>
                    </div>
                    <div class="mb-8">
                        <h2 class="text-5xl font-extrabold tracking-tighter">${formatCompact(totalRevB)}</h2>
                    </div>
                    <div class="pt-6 border-t border-white/10 flex justify-between items-center">
                        <div class="flex items-center gap-2">
                            <span class="text-[10px] font-bold text-white/40 uppercase tracking-widest">${strA}</span>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="text-sm font-bold text-white/60">${formatCompact(totalRevA)}</span>
                            <span class="text-xs font-black ${totalDelta >= 0 ? 'text-[#DDFF55]' : 'text-rose-400'}">
                                ${totalDelta >= 0 ? '+' : ''}${formatCompact(totalDelta)}
                            </span>
                        </div>
                    </div>
                </div>
                <div id="top-5-container">
                    ${renderTop5(data.top_5_rankings, 'products')}
                </div>
            `;

            window.switchTop5Dimension = (dim) => {
                const container = document.getElementById('top-5-container');
                if (container) {
                    container.innerHTML = renderTop5(data.top_5_rankings, dim);
                }
            };

            // Sections
            const sections = document.getElementById('report-sections');
            sections.innerHTML = '';

            // 0. Trends (Daily & Weekly)
            if (data.daily_trends && data.daily_trends.length > 0) {
                const dailyPoints = data.daily_trends.map(t => ({
                    label: new Date(t.date).toLocaleDateString('en-US', { day: 'numeric', month: 'short' }),
                    value: t.revenue
                }));

                sections.insertAdjacentHTML('beforeend', `
                    <h3 class="px-4 mb-4 text-xs font-black uppercase tracking-widest text-slate-400 flex items-center gap-2">
                        <i data-lucide="calendar-days" class="w-3 h-3"></i> Daily Revenue (7 Days)
                    </h3>
                    <div class="card-modern bg-white mb-6">
                        ${generateTrendChart(dailyPoints)}
                    </div>
                `);
            }

            if (data.weekly_trends && data.weekly_trends.length > 0) {
                const weeklyPoints = data.weekly_trends.map(t => {
                    const start = new Date(t.week_start);
                    const end = new Date(t.week_start);
                    end.setDate(end.getDate() + 6);
                    const f = (d) => `${String(d.getDate()).padStart(2, '0')}.${String(d.getMonth() + 1).padStart(2, '0')}`;
                    return {
                        label: `${f(start)}-${f(end)}`,
                        value: t.revenue
                    };
                });

                sections.insertAdjacentHTML('beforeend', `
                    <h3 class="px-4 mb-4 mt-2 text-xs font-black uppercase tracking-widest text-slate-400 flex items-center gap-2">
                        <i data-lucide="calendar" class="w-3 h-3"></i> Weekly Revenue (7 Weeks)
                    </h3>
                    <div class="card-modern bg-white mb-8">
                        ${generateTrendChart(weeklyPoints)}
                    </div>
                `);
            }

            // 1. Gainers
            if (data.drivers?.top_gainers?.length > 0) {
                sections.insertAdjacentHTML('beforeend', `<h3 class="px-4 mb-4 text-xs font-black uppercase tracking-widest text-slate-400 flex items-center gap-2"><i data-lucide="trending-up" class="w-3 h-3"></i> Growth Drivers</h3>`);
                data.drivers.top_gainers.forEach(c => {
                    sections.insertAdjacentHTML('beforeend', `
                        <div class="card-modern card-gain">
                            <div class="flex justify-between items-start mb-6">
                                <div class="flex-1 min-w-0 mr-4">
                                    <h3 class="text-2xl font-extrabold tracking-tight leading-none mb-1 truncate">${c.client}</h3>
                                    <p class="text-[10px] font-bold opacity-40 uppercase tracking-tight whitespace-nowrap">${formatCompact(c.rev_a)} → ${formatCompact(c.rev_b)}</p>
                                </div>
                                <span class="badge-delta bg-white/60 text-green-700 flex-shrink-0 whitespace-nowrap">+${formatCompact(c.delta)}</span>
                            </div>
                            <div class="space-y-3 pt-5 border-t border-black/5">
                                ${c.products.map(p => {
                        const isOther = p.name.toLowerCase().includes('other');
                        let displayName = p.name.replace(/\bitems\b/i, 'products');
                        return `
                                        <div class="flex justify-between items-center text-[11px] ${isOther ? 'italic opacity-50' : ''}">
                                            <span class="font-bold truncate max-w-[200px] text-slate-600">${displayName}</span>
                                            <span class="font-extrabold text-slate-900">${formatCompact(p.rev_a)} → ${formatCompact(p.rev_b)}</span>
                                        </div>
                                    `;
                    }).join('')}
                            </div>
                        </div>
                    `);
                });

                if (data.drivers?.other_clients?.gainers) {
                    const c = data.drivers.other_clients.gainers;
                    sections.insertAdjacentHTML('beforeend', `
                        <div class="card-modern card-gain mb-4">
                            <div class="flex justify-between items-start mb-6">
                                <div class="flex-1 min-w-0 mr-4">
                                    <h3 class="text-2xl font-extrabold tracking-tight leading-none mb-1 truncate">${c.client.replace(/Drivers/i, 'clients')}</h3>
                                    <p class="text-[10px] font-bold opacity-40 uppercase tracking-tight text-slate-500 whitespace-nowrap">${formatCompact(c.rev_a)} → ${formatCompact(c.rev_b)}</p>
                                </div>
                                <span class="badge-delta bg-white/60 text-green-700 flex-shrink-0 whitespace-nowrap">+${formatCompact(c.delta)}</span>
                            </div>
                            <div class="space-y-3 pt-5 border-t border-black/5">
                                ${c.products.map(p => {
                        const isOther = p.name.toLowerCase().includes('other');
                        return `
                                        <div class="flex justify-between items-center text-[11px] ${isOther ? 'italic opacity-50' : ''}">
                                            <span class="font-bold truncate max-w-[200px] text-slate-600">${p.name.replace(/\bitems\b/i, 'products')}</span>
                                            <span class="font-extrabold text-slate-900">${formatCompact(p.rev_a)} → ${formatCompact(p.rev_b)}</span>
                                        </div>
                                    `;
                    }).join('')}
                            </div>
                        </div>
                    `);
                }
            }

            // 2. Decliners
            if (data.drivers?.top_decliners?.length > 0) {
                sections.insertAdjacentHTML('beforeend', `<h3 class="px-4 mb-4 mt-8 text-xs font-black uppercase tracking-widest text-slate-400 flex items-center gap-2"><i data-lucide="trending-down" class="w-3 h-3"></i> Performance Declines</h3>`);
                data.drivers.top_decliners.forEach(c => {
                    sections.insertAdjacentHTML('beforeend', `
                        <div class="card-modern card-decline">
                            <div class="flex justify-between items-start mb-6">
                                <div class="flex-1 min-w-0 mr-4">
                                    <h3 class="text-2xl font-extrabold tracking-tight leading-none mb-1 text-slate-700 truncate">${c.client}</h3>
                                    <p class="text-[10px] font-bold opacity-40 uppercase tracking-tight whitespace-nowrap">${formatCompact(c.rev_a)} → ${formatCompact(c.rev_b)}</p>
                                </div>
                                <span class="badge-delta bg-white/60 text-rose-700 flex-shrink-0 whitespace-nowrap">${formatCompact(c.delta)}</span>
                            </div>
                            <div class="space-y-3 pt-5 border-t border-black/5">
                                ${c.products.map(p => {
                        const isOther = p.name.toLowerCase().includes('other');
                        let displayName = p.name.replace(/\bitems\b/i, 'products');
                        return `
                                        <div class="flex justify-between items-center text-[11px] ${isOther ? 'italic opacity-50' : ''}">
                                            <span class="font-bold truncate max-w-[200px] text-slate-600">${displayName}</span>
                                            <span class="font-extrabold text-slate-900">${formatCompact(p.rev_a)} → ${formatCompact(p.rev_b)}</span>
                                        </div>
                                    `;
                    }).join('')}
                            </div>
                        </div>
                    `);
                });

                if (data.drivers?.other_clients?.decliners) {
                    const c = data.drivers.other_clients.decliners;
                    sections.insertAdjacentHTML('beforeend', `
                        <div class="card-modern card-decline mb-4">
                            <div class="flex justify-between items-start mb-6">
                                <div class="flex-1 min-w-0 mr-4">
                                    <h3 class="text-2xl font-extrabold tracking-tight leading-none mb-1 text-slate-700 truncate">${c.client.replace(/Drivers/i, 'clients')}</h3>
                                    <p class="text-[10px] font-bold opacity-40 uppercase tracking-tight text-slate-500 whitespace-nowrap">${formatCompact(c.rev_a)} → ${formatCompact(c.rev_b)}</p>
                                </div>
                                <span class="badge-delta bg-white/60 text-rose-700 flex-shrink-0 whitespace-nowrap">${formatCompact(c.delta)}</span>
                            </div>
                            <div class="space-y-3 pt-5 border-t border-black/5">
                                ${c.products.map(p => {
                        const isOther = p.name.toLowerCase().includes('other');
                        return `
                                        <div class="flex justify-between items-center text-[11px] ${isOther ? 'italic opacity-50' : ''}">
                                            <span class="font-bold truncate max-w-[240px] text-slate-600">${p.name.replace(/\bitems\b/i, 'products')}</span>
                                            <span class="font-extrabold text-slate-900">${formatCompact(p.rev_a)} → ${formatCompact(p.rev_b)}</span>
                                        </div>
                                    `;
                    }).join('')}
                            </div>
                        </div>
                    `);
                }
            }

            lucide.createIcons();
        }

        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.ready();
                window.Telegram.WebApp.expand();
            }
            fetchReport();
        });
    </script>
</body>

</html>
