<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Daily Market Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #ffffff;
            color: #1a1a1a;
            -webkit-tap-highlight-color: transparent;
        }

        .app-container {
            max-width: 600px;
            margin: 0 auto;
            min-height: 100vh;
            padding-top: 20px;
        }

        .card-modern {
            border-radius: 32px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(0, 0, 0, 0.08);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card-gain {
            background-color: #F3FFEF;
            border: 1px solid rgba(0, 128, 0, 0.05);
        }

        .card-decline {
            background-color: #FFE5E8;
            border: 1px solid rgba(255, 0, 0, 0.05);
        }

        .card-neutral {
            background-color: #F6F1EC;
        }

        .card-new {
            background-color: #E5F6FF;
        }

        .tag {
            background: rgba(255, 255, 255, 0.6);
            padding: 4px 14px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
            color: #1a1a1a;
            white-space: nowrap;
        }

        .badge-delta {
            padding: 6px 12px;
            border-radius: 14px;
            font-weight: 800;
            font-size: 12px;
        }

        #lock-screen {
            position: fixed;
            inset: 0;
            background: white;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
        }
    </style>
</head>

<body class="pb-10 overflow-x-hidden">

    <!-- LOADING SCREEN -->
    <div id="lock-screen">
        <div class="relative w-24 h-24 mb-8 flex items-center justify-center">
            <!-- Outer Glow -->
            <div class="absolute inset-0 bg-blue-500/10 rounded-full blur-xl animate-pulse"></div>
            <!-- Spinning Ring -->
            <div class="absolute inset-0 rounded-full border-[3px] border-slate-100 border-t-blue-600 animate-spin"></div>
            <!-- Center Icon Box -->
            <div class="relative w-16 h-16 bg-white rounded-2xl shadow-xl flex items-center justify-center border border-slate-100">
                <i data-lucide="refresh-cw" class="w-8 h-8 text-blue-600"></i>
            </div>
        </div>
        <h2 class="text-2xl font-extrabold tracking-tight text-slate-900">Analyzing Data...</h2>
        <p class="text-base font-medium text-slate-400 mt-2">Generating your daily report</p>
    </div>

    <div id="view-report" class="app-container hidden">
        <!-- Header -->
        <header class="flex justify-between items-center mb-8 px-8 pt-8">
            <button onclick="window.location.href='index.html'"
                class="w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-sm active:scale-90 transition-transform border border-slate-100">
                <i data-lucide="chevron-left" class="w-6 h-6 text-slate-900"></i>
            </button>
            <h1 class="text-3xl font-extrabold tracking-tight">Analytics</h1>
            <div class="w-12 h-12"></div>
        </header>

        <div class="px-8 mb-4 flex items-center gap-2">
            <div class="w-2.5 h-2.5 bg-green-500 rounded-full animate-pulse"></div>
            <span id="date-label" class="text-sm font-bold text-slate-900 tracking-tight uppercase">Loading
                dates...</span>
        </div>

        <!-- KPI Card -->
        <div id="kpi-container" class="px-8 mb-8">
            <!-- Injected -->
        </div>

        <!-- Sections -->
        <div id="report-sections" class="px-6">
            <!-- Injected -->
        </div>
    </div>

    <!-- Supabase Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        const SUPABASE_URL = "__SUPABASE_URL__";
        const SUPABASE_KEY = "__SUPABASE_KEY__";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const API_BASE = "__API_BASE__";

        function formatCompact(val) {
            const abs = Math.abs(val);
            const sign = val < 0 ? '-' : '';
            if (abs >= 1000000) return `${sign}$${(abs / 1000000).toFixed(2)}M`;
            if (abs >= 1000) return `${sign}$${(abs / 1000).toFixed(1)}K`;
            return `${sign}$${abs.toFixed(0)}`;
        }

        async function checkAccess() {
            try {
                if (!window.Telegram || !window.Telegram.WebApp || !window.Telegram.WebApp.initDataUnsafe?.user) {
                    return false;
                }
                const userId = window.Telegram.WebApp.initDataUnsafe.user.id;
                const { data, error } = await _supabase
                    .from('authorized_users')
                    .select('stock_access, report_access')
                    .eq('telegram_id', userId);

                if (data && data.length > 0) {
                    const user = data[0];

                    // Скрываем кнопку назад, если нет доступа к стоку
                    const hasStock = user.stock_access && user.stock_access !== 'none';
                    if (!hasStock) {
                        const backBtn = document.querySelector('button[onclick*="index.html"]');
                        if (backBtn) backBtn.style.display = 'none';
                    }

                    return user.report_access && user.report_access !== 'none';
                }
                return false;
            } catch (e) { return false; }
        }

        async function fetchReport() {
            try {
                const hasAccess = await checkAccess();
                if (!hasAccess) {
                    document.getElementById('lock-screen').innerHTML = `
                        <div class="p-8 text-center">
                            <i data-lucide="shield-off" class="w-12 h-12 text-rose-500 mx-auto mb-4"></i>
                            <h2 class="text-xl font-bold">Access Denied</h2>
                            <p class="text-sm text-slate-400 mt-2">You are not authorized to view this report.</p>
                        </div>
                    `;
                    lucide.createIcons();
                    return;
                }

                document.getElementById('view-report').classList.remove('hidden');

                // Fetch pre-calculated report from Supabase
                const { data: reportRow, error: reportError } = await _supabase
                    .from('analytical_reports')
                    .select('data, updated_at')
                    .eq('report_id', 'daily_analytics')
                    .single();

                if (reportError || !reportRow) {
                    throw new Error("Report not found in database. Please wait for the daily update.");
                }

                let reportData = reportRow.data;
                if (typeof reportData === 'string') {
                    try {
                        reportData = JSON.parse(reportData);
                    } catch (e) {
                        console.error("JSON Parse Error", e);
                    }
                }

                const updatedAt = new Date(reportRow.updated_at);

                document.getElementById('date-label').innerText = `Report Updated: ${updatedAt.toLocaleDateString()}`;

                renderUI(reportData, updatedAt);
                document.getElementById('lock-screen').style.display = 'none';
                lucide.createIcons();
            } catch (e) {
                console.error(e);
                document.getElementById('lock-screen').innerHTML = `
                    <div class="p-8 text-center">
                        <i data-lucide="alert-circle" class="w-12 h-12 text-red-500 mx-auto mb-4"></i>
                        <h2 class="text-xl font-bold">Data Error</h2>
                        <p class="text-sm text-slate-400 mt-2">${e.message}</p>
                    </div>
                `;
                lucide.createIcons();
            }
        }

        function renderUI(data, updatedAt) {
            // KPI
            const totalRevA = (data.drivers?.top_gainers?.reduce((acc, c) => acc + c.rev_a, 0) || 0) +
                (data.drivers?.top_decliners?.reduce((acc, c) => acc + c.rev_a, 0) || 0);
            const totalRevB = (data.drivers?.top_gainers?.reduce((acc, c) => acc + c.rev_b, 0) || 0) +
                (data.drivers?.top_decliners?.reduce((acc, c) => acc + c.rev_b, 0) || 0);
            const totalDelta = (data.drivers?.top_gainers?.reduce((acc, c) => acc + c.delta, 0) || 0) +
                (data.drivers?.top_decliners?.reduce((acc, c) => acc + c.delta, 0) || 0);

            const yesterdayDate = new Date(updatedAt);
            yesterdayDate.setDate(yesterdayDate.getDate() - 1);
            const yesterdayStr = yesterdayDate.toLocaleDateString('en-US', { day: 'numeric', month: 'short' });

            const dayBeforeDate = new Date(updatedAt);
            dayBeforeDate.setDate(dayBeforeDate.getDate() - 2);
            const dayBeforeStr = dayBeforeDate.toLocaleDateString('en-US', { day: 'numeric', month: 'short' });

            const kpiContainer = document.getElementById('kpi-container');
            kpiContainer.innerHTML = `
                <div class="card-modern bg-black text-white">
                    <div class="mb-2">
                        <p class="text-[11px] font-bold opacity-40 uppercase tracking-[0.2em]">Revenue // ${yesterdayStr}</p>
                    </div>
                    <div class="mb-8">
                        <h2 class="text-5xl font-extrabold tracking-tighter">${formatCompact(totalRevB)}</h2>
                    </div>
                    <div class="pt-6 border-t border-white/10 flex justify-between items-center">
                        <div class="flex items-center gap-2">
                            <span class="text-[10px] font-bold text-white/40 uppercase tracking-widest">${dayBeforeStr}</span>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="text-sm font-bold text-white/60">${formatCompact(totalRevA)}</span>
                            <span class="text-xs font-black ${totalDelta >= 0 ? 'text-[#DDFF55]' : 'text-rose-400'}">
                                ${totalDelta >= 0 ? '+' : ''}${formatCompact(totalDelta)}
                            </span>
                        </div>
                    </div>
                </div>
            `;

            // Sections
            const sections = document.getElementById('report-sections');
            sections.innerHTML = '';

            // 1. Gainers
            if (data.drivers?.top_gainers?.length > 0) {
                sections.insertAdjacentHTML('beforeend', `<h3 class="px-4 mb-4 text-xs font-black uppercase tracking-widest text-slate-400 flex items-center gap-2"><i data-lucide="trending-up" class="w-3 h-3"></i> Growth Drivers</h3>`);
                data.drivers.top_gainers.forEach(c => {
                    sections.insertAdjacentHTML('beforeend', `
                        <div class="card-modern card-gain">
                            <div class="flex justify-between items-start mb-6">
                                <div>
                                    <h3 class="text-2xl font-extrabold tracking-tight leading-none mb-1">${c.client}</h3>
                                    <p class="text-[10px] font-bold opacity-40 uppercase tracking-tight">${formatCompact(c.rev_a)} → ${formatCompact(c.rev_b)}</p>
                                </div>
                                <span class="badge-delta bg-white/60 text-green-700">+${formatCompact(c.delta)}</span>
                            </div>
                            <div class="space-y-3 pt-5 border-t border-black/5">
                                ${c.products.map(p => {
                                    const isOther = p.name.toLowerCase().includes('other');
                                    let displayName = p.name.replace(/\bitems\b/i, 'products');
                                    if (isOther) {
                                        displayName = (c.products.length === 1) 
                                            ? displayName.replace(/\bOther\b/i, '').trim() 
                                            : displayName.replace(/\bOther\b/i, 'other');
                                    }
                                    return `
                                        <div class="flex justify-between items-center text-[11px]">
                                            <span class="font-bold opacity-70 truncate max-w-[200px]">${displayName}</span>
                                            <span class="font-extrabold">${formatCompact(p.rev_a)} → ${formatCompact(p.rev_b)}</span>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                    `);
                });
            }

            // 2. Decliners
            if (data.drivers?.top_decliners?.length > 0) {
                sections.insertAdjacentHTML('beforeend', `<h3 class="px-4 mb-4 mt-8 text-xs font-black uppercase tracking-widest text-slate-400 flex items-center gap-2"><i data-lucide="trending-down" class="w-3 h-3"></i> Decline Drivers</h3>`);
                data.drivers.top_decliners.forEach(c => {
                    sections.insertAdjacentHTML('beforeend', `
                        <div class="card-modern card-decline">
                            <div class="flex justify-between items-start mb-6">
                                <div>
                                    <h3 class="text-2xl font-extrabold tracking-tight leading-none mb-1 text-slate-700">${c.client}</h3>
                                    <p class="text-[10px] font-bold opacity-40 uppercase tracking-tight">${formatCompact(c.rev_a)} → ${formatCompact(c.rev_b)}</p>
                                </div>
                                <span class="badge-delta bg-white/60 text-rose-700">-${formatCompact(Math.abs(c.delta))}</span>
                            </div>
                            <div class="space-y-3 pt-5 border-t border-black/5">
                                ${c.products.map(p => {
                                    const isOther = p.name.toLowerCase().includes('other');
                                    let displayName = p.name.replace(/\bitems\b/i, 'products');
                                    if (isOther) {
                                        displayName = (c.products.length === 1) 
                                            ? displayName.replace(/\bOther\b/i, '').trim() 
                                            : displayName.replace(/\bOther\b/i, 'other');
                                    }
                                    return `
                                        <div class="flex justify-between items-center text-[11px]">
                                            <span class="font-bold opacity-70 truncate max-w-[200px]">${displayName}</span>
                                            <span class="font-extrabold">${formatCompact(p.rev_a)} → ${formatCompact(p.rev_b)}</span>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                    `);
                });
            }



            lucide.createIcons();
        }

        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.ready();
                window.Telegram.WebApp.expand();
            }
            fetchReport();
        });
    </script>
</body>

</html>
